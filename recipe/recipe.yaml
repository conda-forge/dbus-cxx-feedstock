context:
  version: 0.9.2

package:
  name: dbus-cxx
  version: ${{ version }}

source:
  url: https://github.com/pkgw/dbus-cplusplus/releases/download/v${{ version }}pw/libdbus-c---${{ version }}pw.tar.gz
  sha256: 4f140668f2529ecbdce99afbb89f8a977aa47a36248d5f4943b3660316752ee8

build:
  number: 2
  skip: win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - autoconf
    - automake
    - make
    - pkg-config
  host:
    - dbus
    - expat
    - glib
    - libtool
  run_exports:
    - ${{ pin_subpackage('dbus-cxx', upper_bound='x.x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libdbus-c++-glib-1${SHLIB_EXT}

about:
  license: LGPL-2.1-or-later
  license_file: COPYING
  summary: C++ bindings for the DBus system
  homepage: http://dbus-cplusplus.sourceforge.net/

extra:
  recipe-maintainers:
    - danielnachun
    - pkgw
